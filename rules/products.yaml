# Product identity table — PLAN.md 2.1 (products) + 2.2 (client_libraries).
#
# `image_patterns` are case-insensitive regexes tested against a container image
# reference (docker-compose `image:` or a k8s container `image:`). `category` is
# the coarse seed the detector attaches; roles are refined later (Stage 3).
#
# Postgres is deliberately absent from `products`: it is the consolidation
# target, not a store to inventory. Client libraries that imply Postgres
# (pg/psycopg/asyncpg/...) map to the pseudo-product `postgres`, which the
# dependency detector recognizes and skips.
products:
  redis:
    category: [cache]
    image_patterns:
      - '(^|/)redis(/|:|$)'
      - '(^|/)redis-stack(/|:|$)'
      - '(^|/)valkey(/|:|$)'

  memcached:
    category: [cache]
    image_patterns:
      - '(^|/)memcached(/|:|$)'

  elasticsearch:
    category: [search]
    image_patterns:
      - 'elasticsearch'

  opensearch:
    category: [search]
    image_patterns:
      - 'opensearchproject/opensearch'
      - '(^|/)opensearch(/|:|$)'

  mongodb:
    category: [document]
    image_patterns:
      - '(^|/)mongo(/|:|$)'
      - 'mongodb'

  kafka:
    category: [queue]
    image_patterns:
      - 'kafka'
      - 'redpanda'

  rabbitmq:
    category: [queue]
    image_patterns:
      - 'rabbitmq'

  influxdb:
    category: [timeseries]
    image_patterns:
      - 'influxdb'

  clickhouse:
    category: [olap]
    image_patterns:
      - 'clickhouse'

  neo4j:
    category: [graph]
    image_patterns:
      - '(^|/)neo4j(/|:|$)'

  minio:
    category: [unknown]
    image_patterns:
      - '(^|/)minio(/|:|$)'

  # Vector stores reached mostly via client libraries; pinecone is hosted-only
  # (no self-hostable image), weaviate/qdrant also ship containers.
  pinecone:
    category: [vector]
    image_patterns: []

  weaviate:
    category: [vector]
    image_patterns:
      - 'semitechnologies/weaviate'
      - 'cr\.weaviate\.io/'

  qdrant:
    category: [vector]
    image_patterns:
      - '(^|/)qdrant(/|:|$)'

# Dependency detector data — PLAN.md 2.2.
#
# `client_libraries` maps a dependency name (npm package, PyPI project, Ruby
# gem, or Go module path — Go paths are matched after stripping a trailing
# /vN major-version suffix) to the product it implies. Optional `category`
# overrides the product's base category seed for that library (bullmq is Redis
# used as a queue). `broker_from_config: true` marks libraries whose backing
# store is named in app config, not by the library (Celery): only a LITERAL
# broker URL resolves to a product via `broker_schemes`; env-var/settings
# indirection or absent config yields the `unknown-broker` pseudo-product —
# never a guess.
client_libraries:
  # redis
  ioredis: { product: redis }
  redis: { product: redis } # npm `redis`, PyPI `redis`, Ruby `redis`
  node-redis: { product: redis }
  bullmq: { product: redis, category: [queue] }
  bull: { product: redis, category: [queue] }
  bee-queue: { product: redis, category: [queue] }
  sidekiq: { product: redis, category: [queue] }
  'github.com/redis/go-redis': { product: redis }
  'github.com/go-redis/redis': { product: redis }

  # memcached
  memcached: { product: memcached } # npm
  pymemcache: { product: memcached }
  python-memcached: { product: memcached }
  dalli: { product: memcached } # Ruby

  # elasticsearch / opensearch
  '@elastic/elasticsearch': { product: elasticsearch }
  elasticsearch: { product: elasticsearch } # PyPI, Ruby
  '@opensearch-project/opensearch': { product: opensearch }
  opensearch-py: { product: opensearch }
  'github.com/elastic/go-elasticsearch': { product: elasticsearch }

  # mongodb
  mongoose: { product: mongodb }
  mongodb: { product: mongodb } # npm driver
  pymongo: { product: mongodb }
  motor: { product: mongodb }
  mongo: { product: mongodb } # Ruby driver
  mongoid: { product: mongodb } # Ruby ODM
  'go.mongodb.org/mongo-driver': { product: mongodb }

  # kafka
  kafkajs: { product: kafka }
  confluent-kafka: { product: kafka }
  kafka-python: { product: kafka }
  ruby-kafka: { product: kafka }
  'github.com/segmentio/kafka-go': { product: kafka }
  'github.com/confluentinc/confluent-kafka-go': { product: kafka }

  # rabbitmq
  amqplib: { product: rabbitmq }
  pika: { product: rabbitmq }
  bunny: { product: rabbitmq } # Ruby
  'github.com/rabbitmq/amqp091-go': { product: rabbitmq }

  # celery: broker named in config, not by the library
  celery: { broker_from_config: true, category: [queue] }

  # influxdb / clickhouse / neo4j
  '@influxdata/influxdb-client': { product: influxdb }
  influxdb-client: { product: influxdb } # PyPI
  '@clickhouse/client': { product: clickhouse }
  clickhouse-driver: { product: clickhouse } # PyPI
  clickhouse-connect: { product: clickhouse } # PyPI
  neo4j-driver: { product: neo4j } # npm + PyPI share the name

  # vector stores
  '@pinecone-database/pinecone': { product: pinecone }
  pinecone-client: { product: pinecone }
  pinecone: { product: pinecone } # current PyPI name
  weaviate-client: { product: weaviate } # npm + PyPI share the name
  '@qdrant/js-client-rest': { product: qdrant }
  qdrant-client: { product: qdrant } # PyPI

  # postgres clients — recognized so they are NEVER inventoried (pseudo-product)
  pg: { product: postgres } # npm + Ruby gem share the name
  psycopg: { product: postgres }
  psycopg2: { product: postgres }
  psycopg2-binary: { product: postgres }
  asyncpg: { product: postgres }
  'github.com/lib/pq': { product: postgres }
  'github.com/jackc/pgx': { product: postgres }

# Literal broker-URL scheme → product, for `broker_from_config` libraries.
# A scheme not listed here resolves to `unknown-broker` (never guess).
broker_schemes:
  redis: redis
  rediss: redis
  amqp: rabbitmq
  amqps: rabbitmq

# Env/config detector data — PLAN.md 2.3.
#
# `env_vars` maps well-known variable NAMES (matched case-insensitively in
# .env*/config files) to products. Generic names whose product depends on the
# value (DATABASE_URL, BROKER_URL, CACHE_URL, ...) are deliberately absent:
# they resolve through `url_schemes` below, so DATABASE_URL=postgres://...
# correctly detects nothing (Postgres is the consolidation target) while
# DATABASE_URL=mongodb://... detects mongodb.
env_vars:
  REDIS_URL: redis
  REDIS_HOST: redis
  REDISCLOUD_URL: redis
  REDISTOGO_URL: redis
  MEMCACHED_URL: memcached
  MEMCACHED_SERVERS: memcached
  MEMCACHIER_SERVERS: memcached
  ELASTICSEARCH_URL: elasticsearch
  ELASTICSEARCH_HOSTS: elasticsearch
  ELASTIC_URL: elasticsearch
  BONSAI_URL: elasticsearch
  OPENSEARCH_URL: opensearch
  MONGODB_URI: mongodb
  MONGODB_URL: mongodb
  MONGO_URL: mongodb
  MONGO_URI: mongodb
  KAFKA_BROKERS: kafka
  KAFKA_BOOTSTRAP_SERVERS: kafka
  KAFKA_URL: kafka
  RABBITMQ_URL: rabbitmq
  AMQP_URL: rabbitmq
  CLOUDAMQP_URL: rabbitmq
  INFLUXDB_URL: influxdb
  INFLUX_URL: influxdb
  CLICKHOUSE_URL: clickhouse
  CLICKHOUSE_HOST: clickhouse
  NEO4J_URI: neo4j
  NEO4J_URL: neo4j
  PINECONE_API_KEY: pinecone
  PINECONE_ENVIRONMENT: pinecone
  WEAVIATE_URL: weaviate
  QDRANT_URL: qdrant

# URL scheme → product, for URL-shaped values found in env/config files
# (any variable name). postgres/postgresql map to the `postgres`
# pseudo-product so the detector recognizes and skips them. Unlisted schemes
# (http, mysql, ...) detect nothing — an http:// URL identifies no store.
url_schemes:
  redis: redis
  rediss: redis
  memcached: memcached
  mongodb: mongodb
  mongodb+srv: mongodb
  amqp: rabbitmq
  amqps: rabbitmq
  kafka: kafka
  bolt: neo4j
  neo4j: neo4j
  clickhouse: clickhouse
  postgres: postgres
  postgresql: postgres
