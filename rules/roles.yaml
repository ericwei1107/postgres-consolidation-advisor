# Deterministic Stage 3.2 role rules. Commands are normalized case-insensitively.
#
# `command_mix` (Stage 4.3 cacheCommandMix signal): the SAME harvested
# commands partitioned by a different question than `cache.commands` asks.
# `cache.commands` answers "is this store used as a cache (vs a queue)?" —
# so hash/list/set/sorted-set traffic counts, it's still caching.
# `command_mix` answers "does the cache usage need Redis-native structures
# with no clean Postgres equivalent?" — plain get/set KV maps to an UNLOGGED
# table; sorted sets, pub/sub, streams, Lua, INCR rate limiting, and
# hash/list/set structure commands do not (thresholds.yaml
# cache.redis-native-structures-gate).
products:
  redis:
    cache:
      commands: [get, set, setex, del, expire, ttl, mget, mset, incr, zadd, zrange,
                 hget, hset, hgetall, hdel, lpush, rpush, lpop, rpop, lrange,
                 sadd, srem, smembers, sismember]
      min_share: 0.9
      mixed_confidence: medium
    queue:
      libraries: [bull, bullmq, bee-queue, sidekiq, celery]
      commands: [Queue, Worker, add]
    command_mix:
      plain_kv: [get, set, setex, del, expire, ttl, mget, mset]
      native_structure: [zadd, zrange, publish, subscribe, xadd, eval, incr,
                         hget, hset, hgetall, hdel, lpush, rpush, lpop, rpop, lrange,
                         sadd, srem, smembers, sismember]
  memcached:
    fixed_role: cache
    command_mix:
      plain_kv: [get, set, set_multi, delete, incr, decr]
      native_structure: []
  mongodb:
    fixed_role: document
  elasticsearch:
    fixed_role: search
  opensearch:
    fixed_role: search
  kafka:
    fixed_role: queue
  rabbitmq:
    fixed_role: queue
  influxdb:
    fixed_role: timeseries
  clickhouse:
    fixed_role: olap
  neo4j:
    fixed_role: graph
  pinecone:
    fixed_role: vector
  weaviate:
    fixed_role: vector
  qdrant:
    fixed_role: vector
